<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vales</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#aa88ec,#c2b2ff);
text-align:center;
}

.topbar{
background:white;
padding:10px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.topbar button{
padding:8px 15px;
border:none;
border-radius:10px;
background:#aa88ec;
color:white;
cursor:pointer;
}

.container{
margin-top:40px;
}

.ticket{
background:white;
width:250px;
margin:15px auto;
padding:20px;
border-radius:15px;
cursor:pointer;
font-size:18px;
transition:transform .2s, background .3s;
}

.ticket:hover{
transform:scale(1.05);
}

.usado{
background:#ccc;
cursor:not-allowed;
text-decoration:line-through;
}

</style>

</head>

<body>

<div class="topbar">

<button onclick="location.href='app.html'">Inicio</button>
<button onclick="location.href='cartas.html'">Cartas</button>
<button onclick="location.href='logros.html'">Logros</button>
<button onclick="location.href='vales.html'">Vales</button>
<button onclick="location.href='regalo.html'">Regalo</button>
<button onclick="location.href='salir.html'">Salir</button>

</div>

<div class="container">

<h3>Vales</h3>

<div class="ticket" onclick="usarVale(this,'Ir al cine')">
🎬 Ir al cine
</div>

<div class="ticket" onclick="usarVale(this,'Ir a comer')">
🍽 Ir a comer
</div>

<div class="ticket" onclick="usarVale(this,'Darte un abrazo')">
🤗 Darte un abrazo
</div>

<div class="ticket" onclick="usarVale(this,'Chisme todo el día')">
🗣 Chisme todo el día
</div>

<div class="ticket" onclick="usarVale(this,'Ir por un helado')">
🍦 Ir por un helado
</div>

</div>

<script>

function usarVale(elemento,vale){

if(elemento.classList.contains("usado")){
return;
}

const confirmar = confirm("¿Quieres usar el vale de: " + vale + "?");

if(confirmar){

elemento.classList.add("usado");

elemento.innerHTML = "✔ Vale usado<br>" + vale;

alert("Vale utilizado 🎟️");

}

}

</script>

</body>
</html>
